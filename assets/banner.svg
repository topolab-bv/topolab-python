<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="topolab — the Python client for the Topolab geospatial data API">
  <title>topolab — Python SDK</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E7C7B"/>
      <stop offset="1" stop-color="#0B1F2A"/>
    </linearGradient>
    <clipPath id="frame"><rect width="1280" height="320"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1280" height="320" fill="url(#bg)"/>
    <!-- decorative topographic contours -->
    <g fill="none" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="2">
      <circle cx="1110" cy="160" r="70"/>
      <circle cx="1110" cy="160" r="120"/>
      <circle cx="1110" cy="160" r="170"/>
      <circle cx="1110" cy="160" r="220"/>
      <circle cx="1110" cy="160" r="270"/>
    </g>

    <!-- official mark: white disc + teal location pin -->
    <g transform="translate(104 96) scale(1.75)">
      <circle cx="32" cy="32" r="24" fill="#FFFFFF"/>
      <path d="M32 16 L40 28 L32 48 L24 28 Z" fill="#0E7C7B"/>
    </g>

    <text x="248" y="158" font-family="Inter, 'Segoe UI', system-ui, -apple-system, sans-serif"
          font-size="92" font-weight="800" letter-spacing="0.5" fill="#FFFFFF">topolab</text>
    <text x="252" y="204" font-family="Inter, 'Segoe UI', system-ui, -apple-system, sans-serif"
          font-size="27" font-weight="500" fill="#E8DFD3">The Python client for the Topolab geospatial data API</text>

    <rect x="252" y="232" width="330" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.12"/>
    <text x="274" y="260" font-family="'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
          font-size="21" fill="#FFFFFF">pip install topolab</text>

    <rect x="608" y="232" width="118" height="44" rx="22" fill="#E3A857"/>
    <text x="667" y="260" text-anchor="middle" font-family="Inter, 'Segoe UI', system-ui, sans-serif"
          font-size="20" font-weight="700" fill="#0B1F2A">Python</text>
  </g>
</svg>
