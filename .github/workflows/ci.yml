name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          path: topolab-python
      - name: Checkout sdk-spec (fixtures + conventions)
        uses: actions/checkout@v4
        with:
          repository: topolab-bv/topolab-sdk-spec
          path: topolab-sdk-spec
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python }}"
      - run: pip install uv
      - working-directory: topolab-python
        run: uv pip install --system -e ".[dev,geo]"
      - working-directory: topolab-python
        run: pytest -q
      - working-directory: topolab-python
        run: uv build
